{% extends "base.html" %}
{% block title %}Admin — FIA Docs{% endblock %}
{% block content %}
<h5 class="mb-4 text-muted">Admin — Run Scripts</h5>

{% for key, script in scripts.items() %}
<div class="card bg-dark border-secondary mb-4" style="max-width: 700px;">
  <div class="card-body">
    <div class="d-flex justify-content-between align-items-start">
      <div>
        <h6 class="card-title mb-1">{{ script.label }}</h6>
        <p class="text-muted small mb-0">{{ script.description }}</p>
      </div>
      <button
        class="btn btn-sm btn-outline-warning ms-3"
        onclick="runScript('{{ key }}', this)"
      >Run</button>
    </div>
    <pre id="output-{{ key }}"
         class="mt-3 bg-black text-success p-3 rounded small mb-0"
         style="min-height: 60px; max-height: 320px; overflow-y: auto; display: none; white-space: pre-wrap;"></pre>
  </div>
</div>
{% endfor %}

<script>
function runScript(key, btn) {
  const output = document.getElementById('output-' + key);
  output.style.display = 'block';
  output.textContent = 'Starting...\n';
  btn.disabled = true;
  btn.textContent = 'Running…';

  const es = new EventSource('/admin/run/' + key);

  es.onmessage = function(e) {
    if (e.data === '__DONE__') {
      es.close();
      btn.disabled = false;
      btn.textContent = 'Run';
      return;
    }
    output.textContent += e.data + '\n';
    output.scrollTop = output.scrollHeight;
  };

  es.onerror = function() {
    es.close();
    output.textContent += '\n[Connection closed]';
    btn.disabled = false;
    btn.textContent = 'Run';
  };
}
</script>
{% endblock %}
