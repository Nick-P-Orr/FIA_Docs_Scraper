<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}FIA Docs{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #0d1117; }
    .navbar-brand { letter-spacing: 0.05em; }
    table { width: 100%; border-collapse: collapse; margin-bottom: 1rem; }
    th, td { border: 1px solid #30363d; padding: 0.4rem 0.6rem; text-align: left; }
    th { background-color: #161b22; }
    pre code { font-size: 0.8rem; }
  </style>
</head>
<body>
  <nav class="navbar navbar-dark bg-dark border-bottom border-secondary px-3">
    <a class="navbar-brand fw-bold text-white" href="/">FIA Docs</a>
    <div>
      <a class="btn btn-sm btn-outline-light me-1" href="/">Documents</a>
      <a class="btn btn-sm btn-outline-warning" href="/admin">Admin</a>
    </div>
  </nav>

  <div class="container-fluid py-4 px-4">
    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
